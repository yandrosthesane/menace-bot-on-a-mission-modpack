name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'documentation-publish/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Quartz
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git quartz-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: quartz-build
        run: npm ci

      - name: Copy Quartz config, layout, and styles
        run: |
          cp documentation-publish/quartz.config.ts quartz-build/quartz.config.ts
          cp documentation-publish/quartz.layout.ts quartz-build/quartz.layout.ts
          cp documentation-publish/custom.scss quartz-build/quartz/styles/custom.scss

      - name: Assemble content
        run: documentation-publish/build-content.sh "$GITHUB_WORKSPACE" quartz-build/content

      - name: Build site
        working-directory: quartz-build
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-build/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
