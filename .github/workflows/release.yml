name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install tools
        run: sudo apt-get install -y jq zip

      - name: Build release archives
        run: bash release.sh

      - name: Extract changelog for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract content between this version header and the next one
          sed -n "/^## v${VERSION}$/,/^## v/p" docs/features/CHANGELOG.md | sed '1d;$d' > /tmp/release_notes.md
          echo "Found $(wc -l < /tmp/release_notes.md) lines of release notes"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: release/*.zip
