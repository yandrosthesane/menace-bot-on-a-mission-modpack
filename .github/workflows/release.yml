name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install tools
        run: sudo apt-get install -y jq zip

      - name: Build release archives
        run: bash release.sh

      - name: Extract changelog for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract content between this version header and the next one
          sed -n "/^## v${VERSION}$/,/^## v/p" docs/features/CHANGELOG.md | sed '1d;$d' > /tmp/release_notes.md
          echo "Found $(wc -l < /tmp/release_notes.md) lines of release notes"
          cat /tmp/release_notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Check if release exists
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" -F /tmp/release_notes.md
            for f in release/*.zip; do
              gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber
            done
          else
            gh release create "$TAG" release/*.zip --repo "$GITHUB_REPOSITORY" -F /tmp/release_notes.md -t "$TAG"
          fi
